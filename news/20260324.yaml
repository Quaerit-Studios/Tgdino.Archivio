- id: 1
  title: "Neews #1"
  description: |
    A pochi giorni dal lancio di Crimson Desert, la community dei giocatori ha inondato Reddit e i social media con una serie di scoperte imbarazzanti. 
    Esplorando il mondo di Pywel, molti utenti si sono imbattuti in quadri, dipinti e cartelli palesemente generati dall'intelligenza artificiale. Tra cavalli anatomicamente impossibili, cavalieri fusi tra loro, spade dalle geometrie prive di senso e le immancabili mani con dita extra, le immagini sono diventate subito virali.
  links:
  - "https://www.instagram.com/p/DWIENCmDk79"

- id: 2
  title: "Neews #2"
  description: |
    Il mondo del fumetto piange la scomparsa di Sam Kieth, disegnatore e sceneggiatore venuto a mancare il 15 marzo 2026 all'età di 63 anni. 
    La notizia è stata confermata dalla famiglia e da colleghi intimi, rivelando che l'artista lottava da tempo contro le complicazioni della demenza a corpi di Lewy
  links:
