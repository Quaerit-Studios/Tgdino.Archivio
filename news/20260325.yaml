- id: 1
  title: "Disney e OpenAI - Salta l'accordo da 1 miliardo di dollari dopo la chiusura di Sora"
  description: |
    Con una mossa a sorpresa che ha scosso sia il mondo tech che quello di Hollywood, OpenAI ha annunciato la chiusura ufficiale di Sora, 
    la sua celebre e discussa app per la generazione di video tramite intelligenza artificiale. Di conseguenza, l'enorme partnership da 1 miliardo di dollari siglata solo pochi mesi fa (a dicembre 2025) con la Walt Disney Company è stata definitivamente annullata.
  links:
  - "https://www.instagram.com/p/DWSERCyjcSV"

- id: 2
  title: "Il Signore degli Anelli - Stephen Colbert scriverà il nuovo film \"Shadow of the Past\""
  description: |
    Una notizia a sorpresa per i fan della Terra di Mezzo, Stephen Colbert, celebre conduttore televisivo statunitense e noto "super-fan" dell'opera di J.R.R. Tolkien, 
    scriverà un nuovo film de Il Signore degli Anelli che ha attualmente come titolo di lavorazione Shadow of the Past (L'ombra del passato). 
    Il progetto è stato annunciato nelle scorse ore tramite un video sui social dal regista e produttore Peter Jackson. 
    Ad affiancare Colbert alla sceneggiatura ci sarann Philippa Boyens (già autrice delle trilogie originali) e il figlio stesso di Colbert, lo sceneggiatore Peter McGee.
  links:
  - "https://www.instagram.com/p/DWTpx_aDwrY"

- id: 3
  title: "Spider-Man: Beyond the Spider-Verse - In arrivo il primo sguardo ufficiale? "
  description: |
    L'attesa per il capitolo conclusivo della trilogia animata di Miles Morales si fa sempre più spasmodica, ma all'orizzonte sembra finalmente muoversi qualcosa. 
    Phil Lord, mente creativa e produttore del franchise, ha recentemente riacceso le speranze dei fan suggerendo che il primo vero sguardo a Spider-Man: Beyond the Spider-Verse è in dirittura d'arrivo. 
    Sebbene si sia mantenuto sul vago con un criptico "presto" (precisato in altre interviste con un "soon...ish"), la sua dichiarazione è bastata a scuotere la community.
  links:
  - "https://www.instagram.com/p/DWT-Yi1FDrH"
