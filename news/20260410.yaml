- id: 1
  title: "Halloween - Il nuovo survival horror promette di rivoluzionare il genere"
  description: |
    Il videogioco basato sul franchise cinematografico di Halloween promette di portare una ventata d'aria fresca per i titoli horror asimmetrici (1v4). Sviluppato da IllFonic (studio già noto per altri titoli del genere), il gioco punta a differenziarsi nettamente dalla concorrenza, 
    pur mantenendosi fedele alle pellicole originali di John Carpenter che lo hanno ispirato.
  links:
  - "https://www.instagram.com/p/DW7BxWbifmy/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Metal Gear Solid - I registi di \"Final Destination: Bloodlines\" dirigeranno il film live-action"
  description: |
    Dopo anni di incertezze e false partenze, l'adattamento cinematografico di Metal Gear Solid ha trovato la sua nuova guida. Sony Pictures ha infatti affidato ufficialmente al duo composto da Zach Lipovsky e Adam B. 
    Stein il compito di portare sul grande schermo l'iconica saga videoludica creata da Hideo Kojima e Konami.
  links:
  - "https://www.instagram.com/p/DW7FGmfCV3s/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Mercato in Giappone - Nintendo Switch 2 traina la crescita"
  description: |
    Il mercato videoludico e dell'intrattenimento in Giappone ha registrato un nuovo picco nel 2025, raggiungendo un valore complessivo di circa 85 miliardi di euro. 
    A fare da vero e proprio motore per la ripresa del settore fisico e hardware è stato il lancio di Nintendo Switch 2.
  links:
  - "https://multiplayer.it/notizie/in-giappone-il-mercato-dei-contenuti-e-cresciuto-ancora-nel-2025-anche-grazie-a-nintendo-switch-2.html"
