- id: 1
  title: "Clayface - Il nuovo horror del DCU al cinema a ottobre 2026"
  description: |
    Il film DC Studios dedicato al villain mutaforma di Batman arriverà ufficialmente nelle sale il 23 ottobre 2026. Diretto da James Watkins e basato su una sceneggiatura di Mike Flanagan, Clayface porterà il nuovo universo DC in territori inediti proponendo un vero e proprio thriller body-horror. 
    Il ruolo del protagonista, Matt Hagen, è stato affidato all'attore Tom Rhys Harries.
  links:
  - "https://youtu.be/6IxPD-jNdwM?si=R-VoPRipdl5Hgc4j"

- id: 2
  title: "Coyote vs. Acme - Il primo trailer è finalmente online"
  description: |
    Dopo una travagliata attesa, l'iconico predatore dei Looney Tunes sbarca in rete con il primo trailer del suo film. Il mix di animazione e live-action ci mostra finalmente Wile E. 
    Coyote pronto a trascinare in tribunale la spietata multinazionale Acme per i suoi esplosivi difettosi.
  links:
  - "https://youtu.be/b76pK6uYQfA?si=yZ0dCrBNQeYgrblp"

- id: 3
  title: "The Death of Robin Hood - Hugh Jackman sarà uno spietato eroe"
  description: |
    Hugh Jackman si prepara a vestire i panni di un inedito e brutale arciere di Sherwood nel nuovo film The Death of Robin Hood. La pellicola, in arrivo nelle sale il prossimo 19 giugno, 
    promette di mostrare al pubblico una versione decisamente "hardcore" e oscura del celebre fuorilegge.
  links:
  - "https://youtu.be/GSfq5jq7ChQ?si=v7Y9arVYhYRzsWwk"
