- id: 1
  title: "Xbox - Microsoft annuncia il ritorno con un nuovo logo e una nuova missione"
  description: |
    Microsoft Gaming ha annunciato il ritorno ufficiale allo storico marchio Xbox, accompagnato da un rinnovato logo verde fluo. L'azienda ha inoltre svelato una nuova dichiarazione d'intenti per il futuro, 
    promettendo ai giocatori che la piattaforma "sarà costruita per essere accessibile, personale e aperta".
  links:
  - "https://www.instagram.com/p/DXiS5HVD1du/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Michael - Esordio al botteghino per il biopic nonostante le critiche"
  description: |
    Nonostante un'accoglienza decisamente fredda da parte della critica, il film Michael ha dominato il botteghino incassando ben 97 milioni di dollari nel suo weekend di debutto nazionale. Questo risultato permette alla pellicola di superare superando i 
    60 milioni di Straight Outta Compton e diventando così il biopic con il miglior incasso di apertura di sempre.
  links:
  - "https://www.instagram.com/p/DXnqGfalP56/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Alien: Isolation 2 - Sega e Creative Assembly svelano un misterioso teaser trailer"
  description: |
    Sega e lo sviluppatore Creative Assembly hanno sorpreso i fan pubblicando in rete un criptico filmato. Secondo quanto mostrato, il video sembra essere a tutti gli effetti il primissimo teaser trailer dedicato all'attesissimo Alien: Isolation 2, 
    riaccendendo le speranze per il ritorno del survival horror.
  links:
  - "https://youtu.be/cqDrZCcNaio?si=5zU0X2-I4ADGA1AT"
