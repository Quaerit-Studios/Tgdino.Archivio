  title: "Spider-Noir - Svelato il nuovo trailer a colori della serie Prime Video"
  description: |
    "Così è come finisce". Con questa premessa è sbarcato in rete il nuovo trailer ufficiale, questa volta interamente a colori, della serie live-action Spider-Noir. 
    Lo show farà il suo debutto ufficiale in streaming sulla piattaforma Prime Video il prossimo 27 maggio.
