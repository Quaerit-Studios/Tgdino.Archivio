- id: 3
  title: "Marvel's Wolverine - Insomniac conferma la presentazione in primavera"
  description: |
    Insomniac Games ha rassicurato i fan in attesa per Marvel's Wolverine, confermando sui social che una nuova presentazione del gioco per PS5 è ancora prevista per questa primavera. L'evento svelerà ulteriori dettagli e farà da apripista all'apertura ufficiale dei preordini, 
    in vista dell'attesa uscita globale fissata per il 15 settembre 2026.
  links:
  - "https://multiplayer.it/notizie/presentazione-marvels-wolverine-ps5-insomniac-games-risponde.html"
