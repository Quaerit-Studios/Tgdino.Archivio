- id: 1
  title: "Invincible - Completato il doppiaggio della quinta stagione in arrivo nel 2027"
  description: |
    Prime Video ha annunciato che i lavori di doppiaggio per la quinta stagione di Invincible sono ufficialmente conclusi. La conferma è arrivata tramite un ironico post sui social che ha scherzato su quali personaggi torneranno nel cast e quali, decisamente, non ci saranno. L'annuncio svela inoltre che i 
    nuovi episodi della serie animata faranno il loro debutto sulla piattaforma streaming nel corso del 2027.
  links:
  - "https://www.instagram.com/p/DXuvblulq5H/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Subnautica 2 - Krafton si conferma publisher"
  description: |
    Krafton ha confermato ufficialmente che manterrà il suo ruolo di publisher per Subnautica 2, smentendo le recenti voci di una potenziale separazione dallo studio Unknown Worlds nate in seguito alla loro battaglia legale. Tramite il suo ultimo report finanziario, l'azienda sudcoreana ha inoltre rassicurato la community sullo stato dei lavori: i test sulle build preliminari stanno riscuotendo feedback molto positivi e i preparativi per il debutto in accesso anticipato, 
    previsto nel corso del 2026, stanno procedendo senza alcun intoppo.
  links:
  - "https://multiplayer.it/notizie/subnautica-2-sara-pubblicato-da-krafton-i-preparativi-per-laccesso-anticipato-procedono-a-gonfie-vele.html"

- id: 3
  title: "Nacon Connect - Data e giochi confermati per l'evento del 7 maggio"
  description: |
    Nonostante la crisi finanziaria in corso e la recente chiusura dello studio Spiders, Nacon ha confermato il ritorno del suo evento. Il Nacon Connect si terrà giovedì 7 maggio alle 20:00 e sarà trasmesso sui canali Twitch e YouTube ufficiali dell'azienda. La diretta promette nuovi annunci, novità legate all'hardware e sequenze di gameplay esclusive per titoli tra cui figurano i già confermati The Mound: Omen of Cthulhu, 
    Edge of Memories, Endurance Motorsport e Hunter: The Reckoning - DeathWish.
  links:
  - "https://multiplayer.it/notizie/il-nacon-connect-torna-la-prossima-settimana-data-orari-e-i-giochi-confermati-per-levento.html"
