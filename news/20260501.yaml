- id: 1
  title: "Resident Evil - Il film di Zach Cregger punterà su nuove mutazioni"
  description: |
    Il regista del film di Resident Evil, Zach Cregger, ha svelato nuovi dettagli sulla pellicola. L'opera abbandonerà la prospettiva del classico "eroe militare" tipica dei videogiochi, concentrandosi invece su un protagonista normale in cui il pubblico possa immedesimarsi. Cregger ha inoltre anticipato novità sul fronte delle minacce: limitarsi ai classici zombie sarebbe stata "un'occasione sprecata", 
    suggerendo l'arrivo di creature ben più terrificanti scaturite dagli effetti del Virus-T sul corpo umano.
  links:
  - "https://youtu.be/r051sWYOxnE?si=CHd_guPmZdE2dvHK"

- id: 2
  title: "Spider-Man: Brand New Day - Andrew Garfield smentisce il suo ritorno e le teorie sul trailer"
  description: |
    Andrew Garfield ha smentito categoricamente un suo potenziale e segreto coinvolgimento nel prossimo Spider-Man: Brand New Day. L'attore ha inoltre negato di essere uno dei personaggi che, secondo le certezze dei fan, sarebbero stati rimossi digitalmente da una specifica inquadratura del trailer, 
    liquidando l'intera questione come "una teoria del complotto assolutamente ridicola".
  links:
  - "https://www.instagram.com/p/DXxNVNaCZmn/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Subnautica 2 - L'Accesso Anticipato confermato per il 14 Maggio 2026"
  description: |
    Krafton e Unknown Worlds procedono spediti verso il rilascio di Subnautica 2, confermando che il debutto avverrà il 14 Maggio 2026 su PC e Xbox. Il nuovo capitolo del survival sottomarino porterà con sé un'importante novità molto richiesta dai fan, 
    ovvero l'introduzione della modalità cooperativa. 
  links:
  - "https://youtu.be/RPny5cuYvOk?si=ym58I6t_ftDdhPSM"
