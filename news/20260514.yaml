- id: 1
  title: "Panic Delivery - Sopravvivere è l'unica regola per i corrieri"
  description: |
    Un nuovo titolo d'azione che mette i giocatori nei panni di un fattorino alle prime armi. L'obiettivo principale del gioco è semplice: portare a termine le consegne a ogni costo senza rimetterci la vita. Gli utenti dovranno destreggiarsi attraverso percorsi pieni di trappole, pericoli e ostacoli per completare i propri incarichi. Riflessi pronti e nervi saldi saranno i requisiti per 
    riuscire a superare indenni il primissimo e caotico giorno di lavoro.
  links:
  - "https://youtu.be/_ANGx_4UfPI?si=3uT0x7KnjwUJaBvY"

- id: 2
  title: "Wildwood - Laika Studios svela il suo nuovo film d'animazione"
  description: |
    La storia ruota attorno a Prue McKeel, il cui fratellino viene improvvisamente rapito da un inquietante stormo di corvi. Per trarlo in salvo, la protagonista deciderà di intraprendere una disperata missione di salvataggio addentrandosi nelle temibili Terre Invalicabili. Il viaggio la porterà a esplorare una foresta segreta nascosta a tutti. 
    L'uscita nelle sale cinematografiche è ufficialmente fissata per il prossimo 23 ottobre.  
  links:
  - "https://youtu.be/POneS8h1jyU?si=L2hO-LDCDtnLIgcc"

- id: 3
  title: "Feed It - Il gioco italiano che trasforma il virtual pet in un horror psicologico"
  description: |
    Games On A Chair ha annunciato Feed It, un'esperienza horror in arrivo su PC nell'estate 2026. Il giocatore è intrappolato con una creatura misteriosa che deve essere nutrita costantemente per evitare la sua furia. La struttura di gioco promette percorsi multipli, finali differenti e scelte morali difficili. Ispirato a classici come Silent Hill e Mouthwashing, il titolo punta tutto sul disagio emotivo e atmosfere disturbanti. Una demo gratuita sarà resa disponibile a 
    giugno per tutti gli utenti in occasione del prossimo Steam Next Fest.
  links:
  - "https://youtu.be/wlG8krjMQxg?si=9jSPxmT5UhgHYuar"
