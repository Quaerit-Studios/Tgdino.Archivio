- id: 1
  title: "Resident Evil - Svelati due nuovi poster per il film di Zach Cregger"
  description: |
    Il film basato sul franchise videoludico targato Capcom è diretto da Zach Cregger, cineasta già apprezzato dal pubblico e dalla critica per opere horror come Barbarian e Weapons. L'arrivo della pellicola nelle sale cinematografiche è ufficialmente fissato per il prossimo 18 settembre. Le prime immagini promozionali hanno già iniziato a far discutere i fan della saga, curiosi di scoprire la direzione artistica e 
    narrativa che il regista ha scelto per riportare il survival horror sul grande schermo.
  links:
  - "https://www.instagram.com/p/DYnM4vzidHu/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "007 First Light - Il trailer di lancio svela il nuovo James Bond di IO Interactive"
  description: |
    IO Interactive ha pubblicato il trailer di lancio di 007 First Light, in arrivo il 27 maggio su PC, PS5, Xbox Series X|S e Nintendo Switch 2. Si tratta di un action-adventure che fonde lo stealth di Hitman con la frenesia di Uncharted, focalizzato su un James Bond giovane e alle prime armi. La missione si snoderà tra i Carpazi e il mercato nero di Aleph per fermare il villain Bawma, 
    interpretato dalla rockstar Lenny Kravitz. 
  links:
  - "https://youtu.be/kKldeZnLa6U?si=3e3avZ5A3eOWlWTO"

- id: 3
  title: "Pirateria streaming - Smantellata la rete IPTV \"CINEMAGOAL\""
  description: |
    La Guardia di Finanza di Bologna, in coordinamento con Eurojust e le autorità di Francia e Germania, ha smantellato una rete di pirateria digitale legata all'applicazione CINEMAGOAL. La piattaforma distribuiva in modo illegale i contenuti di colossi dello streaming video e musicale come Sky, DAZN, Netflix, Disney+ e Spotify, provocando un danno economico stimato in circa 300 milioni di euro. Il sistema sfruttava server esteri e macchine virtuali attive ventiquattro ore su ventiquattro sul territorio italiano, capaci di catturare e rigenerare i 
    codici di accesso ogni tre minuti partendo da abbonamenti regolari attivati con false identità.  
  links:
  - "https://multiplayer.it/notizie/pirateria-streaming-italia-smantellata-rete-300-milioni-colpiva-sky-netflix-dazn.html"
