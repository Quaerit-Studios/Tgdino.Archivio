- id: 1
  title: "State of Play del 2 giugno"
  description: |
    Sony terrà stasera alle 23:00 lo State of Play della durata di oltre un'ora.Marvel's Wolverine è stato già confermato, pronto a mostrare per la prima volta il gameplay prima del lancio ufficiale fissato per il 15 settembre. Il resto dello show è aperto alle speculazioni sui team first-party: tra i titoli si attendono aggiornamenti sul misterioso Intergalactic: The Heretic Prophet di Naughty Dog, sullo spin-off cooperativo Horizon Hunters Gathering di Guerrilla e sui nuovi progetti di Santa Monica Studio, oltre a esclusive temporali pronte al debutto come Phantom Blade Zero. Per quanto riguarda le terze parti, i riflettori sono puntati sui giochi dedicati a John Wick, Castlevania: Belmont’s Curse e Marvel 1943: Rise of Hydra, mentre è data per esclusa la presenza di GTA VI. Sul fronte hardware, infine, nonostante i rumor persistenti su console portatili o su una futura PS6, 
    l'ipotesi di annunci concreti durante l'evento rimane decisamente improbabile.
  links:
  - "https://it.ign.com/state-of-play/225767/cosa-aspettarsi-dallo-state-of-play-del-2-giugno-annunci-attesi-e-possibili-sorprese"

- id: 2
  title: "Backrooms - Il miglior debutto di sempre per A24"
  description: |
    Il film horror ha dominato il botteghino al suo debutto nelle sale, conquistando la vetta della classifica. Nel suo primo fine settimana di programmazione, la pellicola ha registrato un incasso nazionale stimato di ben 81,45 milioni di dollari in 3.442 cinema, raggiungendo un totale di 118 milioni di dollari a livello globale. Questi numeri segnano un traguardo: 
    si tratta infatti del miglior weekend di apertura di sempre nella storia dello studio indipendente A24. 
  links:
  - "https://www.instagram.com/p/DZBrDotDMuk/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Baldur's Gate 2 - Rumor su un remake ufficiale targato Wizards of the Coast"
  description: |
    Secondo recenti indiscrezioni, Wizards of the Coast sarebbe al lavoro su un remake ufficiale di Baldur's Gate 2. Il progetto vedrebbe anche il coinvolgimento di Kevin Martens, co-lead designer del gioco originale sviluppato da BioWare nel 2000. L'operazione mirerebbe a cavalcare l'enorme successo del terzo capitolo in attesa di un futuro Baldur's Gate 4. Resta la grande incognita sul sistema di combattimento: i fan si chiedono se rimarrà fedele al classico tempo reale con pausa tattica o se verrà aggiornato a turni. 
    Al momento, Hasbro ha preferito non commentare le voci.  
  links:
  - "https://www.instagram.com/p/DZC2tAJn6U5/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
