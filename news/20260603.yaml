- id: 1
  title: "God of War Laufey - Il lancio potrebbe essere più vicino del previsto"
  description: |
    Secondo il giornalista Jason Schreier, l'appena annunciato God of War Laufey potrebbe arrivare sul mercato molto prima di quanto si pensi. Attraverso un intervento su Bluesky, Schreier ha rassicurato i fan spiegando che l'assenza di una finestra di lancio ufficiale non deve preoccupare, poiché il titolo non richiederà anni di attesa a differenza di altre grandi produzioni. L'unico vincolo per il debutto sarà 
    quello di evitare il più possibile la concomitanza con l'uscita di GTA 6. 
  links:
  - "https://multiplayer.it/notizie/god-of-war-laufey-potrebbe-uscire-prima-di-quanto-si-pensi.html"

- id: 2
  title: "Backrooms 2 - Kane Parsons è già alla ricerca di uno sceneggiatore per il sequel"
  description: |
    Secondo le ultime indiscrezioni, un sequel sarebbe già nelle primissime fasi di sviluppo. Il giovane creatore e regista Kane Parsons è infatti attivamente alla ricerca di un co-sceneggiatore con cui collaborare per la stesura del nuovo capitolo. Il progetto si trova ancora alle battute iniziali, sprovvisto di un via libera formale o di un cast confermato, ma è stato reso noto che il contratto di Parsons per eventuali futuri film legati alla 
    creepypasta rimane saldamente nelle mani dello studio di produzione A24. 
  links:
  - "https://www.instagram.com/p/DZFwGe8ILcc/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Tomb Raider: Legacy of Atlantis - Confermato l'uso dell'IA nello sviluppo"
  description: |
    Flying Wild Hog e Crystal Dynamics hanno svelato il nuovo trailer del remake della prima avventura di Lara Croft, confermando inoltre l'utilizzo dell'intelligenza artificiale durante i lavori. Tramite la pagina ufficiale di Steam, gli sviluppatori hanno precisato che gli strumenti IA sono stati impiegati esclusivamente nelle fasi iniziali di prototipazione per creare asset temporanei. I team hanno però rassicurato i fan: ogni elemento generato artificialmente è stato successivamente perfezionato o del tutto sostituito dal lavoro umano, 
    al fine di preservare intatta la visione artistica e creativa del progetto originale.  
  links:
  - "https://multiplayer.it/notizie/tomb-raider-legacy-of-atlantis-creato-usando-ia.html"
