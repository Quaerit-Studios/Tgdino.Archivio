- id: 1
  title: "Il Grinch - Jim Carrey e Ron Howard in trattative per il sequel del film del 2000"
  description: |
    Jim Carrey sarebbe in trattative per riprendere il suo iconico ruolo nel sequel di Il Grinch (How the Grinch Stole Christmas), il celebre cult natalizio del 2000. Il progetto vedrebbe il ritorno dietro la macchina da presa anche del regista originale, il premio Oscar Ron Howard. Nonostante in passato l'attore avesse espresso riluttanza all'idea di realizzare dei sequel per i suoi storici, i negoziati per riportare sul grande schermo la creatura del 
    Dr. Seuss sembrano aver preso ufficialmente il via. 
  links:
  - "https://www.instagram.com/p/DZvL0hVDwM6/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Sony aggiorna la strategia PlayStation - Focus sull'IA e revisione dei piani per PC"
  description: |
    Il nuovo documento strategico annuale di Sony introduce ufficialmente l'intelligenza artificiale nei piani di PlayStation, con l'obiettivo dichiarato di supportare la creatività dei propri studi di sviluppo e migliorare l'esperienza utente. Il report formalizza inoltre un cambio di rotta per il mercato PC, specificando che la release sulla piattaforma sarà garantita di norma solo per i titoli live service, 
    mentre le altre produzioni verranno valutate caso per caso.  
  links:
  - "https://multiplayer.it/notizie/sony-punta-sullia-per-migliorare-i-giochi-e-lesperienza-su-playstation.html"

- id: 3
  title: "Samsung brevetta uno smartphone con display sia pieghevole che arrotolabile"
  description: |
    Samsung ha depositato un brevetto per un dispositivo che unisce la tecnologia degli schermi pieghevoli a libro a una sezione estensibile e arrotolabile. Nella configurazione chiusa, lo smartphone presenta una forma spessa e allungata che ricorda i cellulari degli anni Novanta, ma una volta aperto del tutto è in grado di espandersi fino a raggiungere le dimensioni di un piccolo tablet. Il progetto punta a massimizzare la superficie utile sfruttando la flessibilità dei pannelli OLED, anche se, trattandosi di un brevetto, 
    non vi è alcuna certezza su un suo futuro debutto commerciale. 
  links:
  - "https://multiplayer.it/notizie/samsung-brevetta-smartphone-mattone.html"
