- id: 1
  title: "Valve - Annunciato il prezzo della Steam Machine"
  description: |
    Arriverà sul mercato alla cifra di 1049 dollari. Il costo elevato, superiore a quanto inizialmente pianificato dalla compagnia per il suo mini PC da gaming, è una diretta conseguenza della crisi dei prezzi dei componenti, battezzata "RAMpocalypse". Nonostante la spesa, le prime indicazioni suggeriscono che le contromisure adottate per la distribuzione dovrebbero quantomeno limitare il fenomeno degli scalper 
    e dei bot rispetto ai problematici lanci hardware del passato. 
  links:
  - "https://www.instagram.com/p/DZ5VFWdk_EE/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Sea of Thieves - Destin Daniel Cretton produrrà il film live-action tratto dal gioco"
  description: |
    Il progetto sarà prodotto da Destin Daniel Cretton, già regista di grandi blockbuster Marvel tra cui l'imminente Spider-Man: Brand New Day. Al momento non sono stati rilasciati ulteriori dettagli sulla trama, 
    sul cast o sulla possibile finestra di lancio della pellicola.  
  links:
  - "https://www.instagram.com/p/DZ5rdekCfMq/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Le Superchicche - Warner Bros. Pictures Animation annuncia un nuovo film d'animazione"
  description: |
    Durante il Festival di Annecy, Warner Bros. Pictures Animation ha svelato che un nuovo lungometraggio animato dedicato a Le Superchicche (The Powerpuff Girls) è attualmente in fase di sviluppo. Il progetto si trova ancora nelle primissime fasi creative e non ha ancora ricevuto il semaforo verde definitivo, poiché i dettagli contrattuali e l'acquisizione dei diritti sono in via di finalizzazione. Al momento non sono stati rilasciati dettagli sulla trama o sulla 
    finestra di lancio per il ritorno al cinema di Lolly, Dolly e Molly. 
  links:
  - "https://www.instagram.com/p/DZ6KH0nj3yJ/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
