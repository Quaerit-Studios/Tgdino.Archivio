  title: "The Hunger Games: Sunrise on the Reaping arriva al cinema a novembre"
  description: |
    "Possa la fortuna essere sempre a vostro favore". Questa frase torna a risuonare per invitarci a esplorare ancora una volta il crudele mondo distopico di Panem. Il nuovo capitolo cinematografico della saga, 
    The Hunger Games: Sunrise on the Reaping, farà ufficialmente il suo debutto nelle sale di tutto il mondo il prossimo 20 novembre.
  links:
  - "https://youtu.be/fS35YSjopjE?si=8JhVsmsinC0BC5LW"

- id: 2
  title: "Insidious: Out of the Further - Il primo trailer svelato al CinemaCon 2026"
  description: |
    L'Altrove sta per aprire nuovamente le sue porte. Durante il consueto panel di Sony Pictures al CinemaCon di Las Vegas, è stato mostrato 
    ufficialmente il primo trailer di Insidious: Out of the Further, il sesto capitolo della saga horror prodotta da Blumhouse.
  links:
  - "https://youtu.be/ovnITQDbjUA?si=Sipv5DtPv0BMJ1tb"

