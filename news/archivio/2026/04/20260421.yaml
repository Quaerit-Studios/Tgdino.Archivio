  title: "Counter-Strike 2 - Giocatore sferra un pugno sul palco all'avversario e riceve un ban di 10 anni"
  description: |
    Uno spiacevole episodio di violenza ha macchiato la scena competitiva di Counter-Strike 2 in Germania. Durante un recente torneo dal vivo, un giocatore professionista non ha saputo gestire la sconfitta e ha aggredito fisicamente un avversario direttamente sul palco, 
    venendo punito con una squalifica esemplare.
