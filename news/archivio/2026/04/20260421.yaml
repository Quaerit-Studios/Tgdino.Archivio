- id: 2
  title: "Elden Ring - L'adattamento live-action di Alex Garland uscirà al cinema a marzo 2028"
  description: |
    Bandai Namco e A24 hanno ufficialmente annunciato che l'adattamento cinematografico in live-action di Elden Ring, il pluripremiato videogioco targato FromSoftware, 
    farà il suo debutto nelle sale cinematografiche il 3 marzo 2028.
  links:
  - "https://www.instagram.com/p/DXWtUMFDN8n/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Patrick Muldoon - L'attore di Starship Troopers e Melrose Place è morto a 57 anni"
  description: |
    L'attore e produttore statunitense Patrick Muldoon, diventato un volto celebre negli anni Novanta grazie a popolari produzioni televisive e cinematografiche, si è spento all'età di 57 anni. Secondo le notizie riportate, 
    il decesso è avvenuto a causa di un improvviso attacco cardiaco.
  links:
  - "https://www.instagram.com/p/DXXB1IqjtCm/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
