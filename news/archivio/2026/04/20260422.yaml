- id: 1
  title: "Elden Ring - Oltre 100 milioni di dollari di budget per il film live-action"
  description: |
    L'adattamento cinematografico di Elden Ring si preannuncia come un vero e proprio colosso hollywoodiano. Le ultime indiscrezioni, confermate anche da The Hollywood Reporter, rivelano che A24 sta investendo nel progetto cifre mai viste prima nella sua storia: con un budget che supera ampiamente i 100 milioni di dollari, 
    il film diretto da Alex Garland è stato ufficialmente classificato come l'opera "più grande e ambiziosa" mai realizzata dallo studio.
  links:
  - "https://www.instagram.com/p/DXZEYI5j2xm/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "La casa: Il rogo del Male (Evil Dead Burn) - L'incubo dei Deadite torna al cinema a luglio"
  description: |
    Il franchise horror creato da Sam Raimi è pronto a mietere nuove vittime. È stato annunciato l'arrivo nelle sale di Evil Dead Burn (noto in Italia con il titolo La casa - Il rogo del Male), il nuovo e sanguinoso capitolo 
    della saga che promette di riportare sul grande schermo la ferocia e il terrore che hanno reso celebri i Deadite.
  links:
  - "https://youtu.be/Jprb69FaaPw?si=5YyyAWOq2yUJxtWG"

- id: 3
  title: "Gundam - Al via le riprese del film live-action Netflix con Sydney Sweeney"
  description: |
    Sono ufficialmente iniziate in Australia le riprese del live-action Netflix dedicato a Gundam. Sydney Sweeney e Noah Centineo guidano il cast di questa storia, diretta da Jim Mickle. Il film seguirà due piloti di mecha rivali, 
    schierati su fronti opposti di una guerra spaziale e intrappolati in una corsa contro il tempo per decidere le sorti dell'umanità.
  links:
  - "https://www.instagram.com/p/DXaJFsMiSbR/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
