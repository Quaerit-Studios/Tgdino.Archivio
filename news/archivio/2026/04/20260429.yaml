- id: 1
  title: "Tim Cain - L'autore di Fallout al lavoro su un nuovo gioco"
  description: |
    "Il co-creatore di Fallout, ha svelato su YouTube l'intenzione di realizzare un ultimo gioco prima del suo definitivo "secondo pensionamento". Il game designer, tornato a collaborare attivamente con Obsidian dopo il ritiro del 2020, non ha rivelato dettagli sul progetto in cantiere. Visti i suoi trascorsi, 
    è però altamente probabile che si tratti di un nuovo RPG in sviluppo proprio presso gli studi di Obsidian.
  links:
  - "https://multiplayer.it/notizie/uno-degli-autori-storici-di-fallout-potrebbe-essere-al-lavoro-su-un-nuovo-gioco.html"

- id: 2
  title: "GTA 6 - Il marketing inizierà \"presto\", terzo trailer in arrivo?"
  description: |
    Il CEO di Take-Two, Strauss Zelnick, ha confermato che la vera e propria campagna pubblicitaria per GTA 6 prenderà il via "presto". Questa dichiarazione riaccende le speranze per l’arrivo del terzo trailer e rassicura i fan sull'effettiva data di uscita. L'avvio del marketing, infatti, suggerisce che l'attuale lancio fissato per novembre 2026 (su PS5 e Xbox Series X) sia ormai definitivo, 
    allontanando lo spettro di nuovi rinvii.
  links:
  - "https://multiplayer.it/notizie/marketing-pubblicitario-gta-6-iniziera-presto-trailer-3-in-arrivo.html"

- id: 3
  title: "Game Quest - Il gioco di Steam in cui il tuo backlog cerca di ucciderti"
  description: |
    Lo sviluppatore indipendente Nic Taylor ha ideato un concept unico per il suo nuovo action game in uscita nel 2026: Game Quest: The Backlog Battler. Il gioco legge i dati pubblici del profilo Steam dell'utente e trasforma i titoli acquistati e provati per meno di due ore in ondate di nemici all'interno di un'arena. Le caratteristiche dei giochi reali (come prezzo, 
    punteggio Metacritic o presenza di DLC) determineranno la potenza e la tipologia degli avversari da affrontare.
  links:
  - "https://multiplayer.it/notizie/su-steam-sta-per-arrivare-un-gioco-in-cui-il-vostro-backlog-tentera-di-uccidervi.html"
