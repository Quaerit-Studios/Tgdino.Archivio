- id: 1
  title: "UFO - Il governo USA pubblica nuovi file, ma per il web le immagini sono \"ridicole\""
  description: |
    In seguito alla recente pubblicazione di documenti e file multimediali relativi agli UFO da parte del governo degli Stati Uniti, la reazione di internet non si è fatta attendere. Lungi dall'essere sbalorditi dalle presunte rivelazioni, moltissimi utenti sui social media hanno definito le immagini e i video rilasciati letteralmente "ridicoli", 
    criticando aspramente la scarsa qualità e la dubbia natura del materiale declassificato.
  links:
  - "https://www.instagram.com/p/DYGWDTdDIrj/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "GCC Pokémon - The Pokémon Company lancia un monito contro le molestie agli eventi"
  description: |
    The Pokémon Company ha lanciato un duro monito contro molestie e aggressività durante i tornei ufficiali. Il provvedimento nasce da gravi episodi di minacce e violenza fisica rivolti a giudici e membri dello staff. Chiunque terrà condotte inappropriate rischia l'allontanamento immediato dalla sede e il ban dell'account. 
    L'azienda punta a tutelare il personale dopo le irregolarità emerse nella Yokohama Champions League 2026. 
  links:
  - "https://multiplayer.it/notizie/the-pokemon-company-si-scaglia-contro-i-giocatori-per-molestie-e-comportamenti-aggressivi-agli-eventi-gcc-pokemon.html"

- id: 3
  title: "Gamble With Your Friends - Superato il milione di copie vendute in una settimana"
  description: |
    Il titolo cooperativo Gamble With Your Friends ha raggiunto lo straordinario traguardo di un milione di copie vendute in una sola settimana su Steam. Il team di sviluppo TEAM GWYF ha ringraziato calorosamente la community per l'incredibile supporto ricevuto fin dal giorno del lancio. L'opera si presenta come un "casino crawler" online, affrontabile in solitaria o in cooperativa fino a un massimo di sei giocatori. L'obiettivo del gruppo è 
    condividere un conto in banca e tentare la fortuna per ripagare un colossale debito a uno strozzino entro il tempo limite. 
  links:
  - "https://multiplayer.it/notizie/gamble-with-your-friends-ha-venduto-piu-di-1-milione-di-copie-in-una-settimana.html"
