- id: 1
  title: "LEGO Il Signore degli Anelli - Annunciato ufficialmente il set di Minas Tirith"
  description: |
    Il modello da collezione è composto da 8.278 pezzi e sarà messo in vendita al prezzo di 649,99 dollari. La data di uscita è fissata per il 4 giugno, ma gli utenti iscritti al programma LEGO Insiders avranno l'accesso anticipato dal 1° giugno. Come omaggio per l'acquisto (GWP), 
    l'azienda includerà gratuitamente un esclusivo set promozionale raffigurante l’ariete degli orchi Grond.
  links:
  - "https://www.instagram.com/p/DYPqrQTjM69/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "GTA VI - Budget oltre il miliardo, vendite da capogiro necessarie per il pareggio"
  description: |
    L'enorme investimento di Rockstar Games richiederà un successo commerciale senza precedenti e la conquista delle classifiche storiche anche solo per raggiungere il pareggio. L'aumento esponenziale delle spese di sviluppo sta spingendo l'intera industria videoludica a interrogarsi seriamente sulla reale sostenibilità economica dei grandi progetti. Per far fronte a queste cifre, emergono inoltre indiscrezioni da parte degli 
    analisti su un potenziale aumento del prezzo base del gioco fino a 80 dollari.  
  links:
  - "https://www.instagram.com/p/DYQP-Cgjj6_/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Yuukai Shoumei Shashin - L'horror giapponese che fonde realtà e messaggistica"
  description: |
    Il collettivo Daiyonkyokai ha lanciato Yuukai Shoumei Shashin, un nuovo horror sperimentale gratuito accessibile via browser. La trama segue Tsumugi, una studentessa intrappolata in una cabina fotografica soprannaturale con cui comunichiamo via chat. Il gameplay simula un'app di messaggistica dove i giocatori inviano comandi testuali e ricevono selfie in tempo reale. La vera particolarità è l'integrazione fisica: 
    bisogna scattare foto in reali cabine giapponesi per sbloccare parti della storia.
  links:
  - "https://www.instagram.com/p/DYQP-Cgjj6_/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
