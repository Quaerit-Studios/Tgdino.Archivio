- id: 1
  title: "Subnautica 2 - Lancio con un milione di copie vendute in un'ora"
  description: |
    Il successo è testimoniato anche dall'incredibile affluenza sui server, con un picco record di ben 467mila giocatori connessi in contemporanea su Steam. Questi risultati spazzano via tutti i dubbi generati dalle recenti controversie aziendali che avevano colpito lo studio di sviluppo. L'avventura, che introduce l'attesissima modalità cooperativa, 
    si appresta ora ad affrontare il suo percorso di aggiornamenti.
  links:
  - "https://www.instagram.com/p/DYVJl_liX1x/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Windrose - Il survival piratesco supera i 2 milioni di copie vendute"
  description: |
    Il survival cooperativo sviluppato da Kraken Express ha raggiunto il traguardo in un solo mese dal lancio del gioco in versione di accesso anticipato. L'opera invita gli utenti a esplorare mari pericolosi, affrontare creature soprannaturali e costruire il proprio avamposto da pirati. Il periodo di early access durerà circa due anni e gli sviluppatori 
    prevedono almeno sei mesi di lavoro per il primo grande aggiornamento "Ashlands".  
  links:
  - "https://multiplayer.it/notizie/il-survival-piratesco-windrose-non-si-ferma-e-taglia-un-altro-traguardo-di-vendite-su-steam.html"

- id: 3
  title: "Bandai Namco - L'intelligenza artificiale per ottimizzare lo sviluppo"
  description: |
    Durante un recente incontro con gli investitori, Bandai Namco ha confermato l'impiego dell'intelligenza artificiale per rendere più efficiente lo sviluppo dei propri titoli. L'azienda utilizza attualmente questi strumenti tecnologici principalmente per facilitare e sveltire la ricerca all'interno di dati storici e librerie di contenuti. Al momento, la dirigenza non ha specificato se l'IA venga impiegata o meno anche per la generazione diretta degli asset grafici dei videogiochi. La società ha ribadito l'intenzione di continuare a studiare 
    l'evoluzione di questa tecnologia per integrarla in futuro in contesti sempre più idonei.
  links:
  - "https://multiplayer.it/notizie/bandai-namco-conferma-sta-usando-ia-per-rendere-sviluppo-piu-efficiente.html"
