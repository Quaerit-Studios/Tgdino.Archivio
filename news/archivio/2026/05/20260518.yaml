- id: 1
  title: "Xbox - In arrivo una nuova funzione per il tracciamento del Gamerscore"
  description: |
    Microsoft si prepara ad arricchire l'ecosistema Xbox introducendo una nuova funzionalità pensata appositamente per i videogiocatori più completisti. Il sistema operativo della console verrà presto aggiornato con un'opzione inedita per monitorare dettagliatamente l'andamento del proprio Gamerscore. Questa aggiunta permetterà agli utenti di tenere traccia 
    dei progressi nell'ottenimento degli obiettivi in modo decisamente più preciso.
  links:
  - "https://www.instagram.com/p/DYbXu22D9rl/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Adventure Time: Side Quests - Svelato il poster ufficiale della nuova serie"
  description: |
    Si tratterà di un'inedita serie a episodi pensata per espandere ulteriormente l'universo fantasy nato in televisione. La premiere di questa nuova produzione debutterà ufficialmente il prossimo 29 giugno. Gli appassionati potranno seguire le avventure 
    dei protagonisti direttamente in streaming sulle piattaforme Disney+ e Hulu.
  links:
  - "https://www.instagram.com/p/DYfBTpcF4e0/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ=="

- id: 3
  title: "Nex Playground - La \"console per famiglie\" arriva nel Regno Unito"
  description: |
    Dopo il Nord America, la console si appresta a debuttare ufficialmente sul mercato del Regno Unito e dell'Irlanda. Il dispositivo è pensato per un pubblico giovane e punta tutto sul tracciamento dei movimenti. Il prezzo di lancio fissato per il territorio britannico è di 269 sterline (circa 319€), con le prenotazioni già aperte presso i principali rivenditori come Amazon UK, Smyth Toys e Argos. L'esperienza di gioco è strettamente legata al servizio in abbonamento "Play Pass", 
    che prevede una spesa aggiuntiva di 90 sterline all'anno o 45 sterline a trimestre. 
  links:
  - "https://youtu.be/wm8zUuuIWnc?si=Mz9mfpR0pWuwm4kd"
