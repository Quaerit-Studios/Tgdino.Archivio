- id: 1
  title: "Cerulean Onslaught - FromSoftware al lavoro su un souls-like piratesco?"
  description: |
    Il titolo segnerebbe un ritorno alle radici puramente per giocatore singolo dello studio, distaccandosi dalle recenti formule multiplayer viste in progetti come The Duskbloods e Elden Ring Nightreign. Il cuore del gameplay ruoterebbe attorno alla navigazione in mare. La propria imbarcazione fungerebbe da hub centrale per spostarsi tra isole remote, mantenendo intatto il DNA della formula Souls-like. 
    I leak suggeriscono che il reveal ufficiale avverrà sul palco del Summer Game Fest 2026. 
  links:
  - "https://www.everyeye.it/notizie/fromsoftware-creando-gioco-piratesco-cosa-sappiamo-876813.html"

- id: 2
  title: "The Dark Pictures - I segreti e i salti temporali del teaser di \"Craven Man\""
  description: |
    La scoperta del teaser nascosto all'interno di Directive 8020 sta già scatenando le teorie degli appassionati, intrigati non solo dalle atmosfere horror in stile The Ring, ma anche da un dettaglio cronologico tutt'altro che casuale. La sequenza di date che lampeggia sullo schermo alla fine del filmato (1988, 2019, 2028 e 2029) offre infatti spunti narrativi per quella che si preannuncia come l'avventura più ambiziosa dell'antologia. Questa struttura a incastro suggerisce una trama frammentata su più linee temporali, 
    dove le azioni compiute nel passato potrebbero influenzare direttamente la sopravvivenza dei personaggi nel futuro.
  links:
  - "https://www.everyeye.it/notizie/the-dark-pictures-anthology-spunta-trailer-prossimo-capitolo-878986.html"

- id: 3
  title: "Far Far West - L'atipico sparatutto western supera il milione di copie su Steam"
  description: |
    Il titolo aveva già mostrato un grande potenziale registrando la cifra di oltre 250mila copie acquistate nelle primissime quarantotto ore dal lancio in Accesso Anticipato. L'opera propone una miscela che unisce una classica ambientazione western a cupe contaminazioni horror, mettendo l'utente al comando di cacciatori di taglie robotici. Affrontabile in solitaria o in modalità cooperativa per un massimo di quattro giocatori, 
    l'obiettivo è completare missioni per lo sceriffo locale e incassare ricche ricompense. 
  links:
  - "https://multiplayer.it/notizie/far-far-west-ha-raggiunto-quota-1-milione-di-copie-vendute-su-steam.html"
