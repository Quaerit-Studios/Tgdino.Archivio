- id: 2
  title: "Splinter Cell - La grafica fotorealistica è diventata un ostacolo per i giochi stealth"
  description: |
    L'ex direttore creativo di Splinter Cell: Chaos Theory, Clint Hocking, ha spiegato che l'evoluzione verso un'illuminazione sempre più realistica sta paradossalmente rendendo molto più difficile la vita sia ai creatori che ai giocatori. Nei titoli del passato, l'utilizzo di luci pre-calcolate permetteva di avere zone d'ombra nette, rendendo chiaro all'utente dove potersi nascondere per evitare le ronde nemiche. Oggi, con l'introduzione di tecnologie avanzate come l'occlusione ambientale e la diffusione dinamica, 
    le sfumature organiche della luce rendono gli ambienti di gioco molto meno "leggibili" durante l'azione.
  links:
  - "https://www.instagram.com/p/DYmbF1WFvRZ/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "State of Play - Tra Marvel's Wolverine e i rumor sul nuovo God of War"
  description: |
    L'annuncio ufficiale del prossimo State of Play, fissato per il 2 giugno, ha inevitabilmente dato il via ai primi grandi rumor sui contenuti dell'evento, alimentati dalle indiscrezioni del noto insider NateTheHate. Si aspetta Marvel's Wolverine in primo piano, l'unico vero protagonista già confermato ufficialmente. Speriamo nel nuovo progetto di Santa Monica. Le voci di corridoio puntano a uno spin-off della saga di God of War, che potrebbe focalizzarsi sulla figura di Faye, la moglie di Kratos. L'evento potrebbe fare luce su altre produzioni interne dei PlayStation Studios. Tra i candidati spiccano Intergalactic: 
    The Heretic Prophet di Naughty Dog e il titolo live-service Fairgames. 
  links:
  - "https://multiplayer.it/notizie/oltre-a-marvels-wolverine-lo-state-of-play-potrebbe-presentare-un-nuovo-god-of-war-e-altre-esclusive-ps5.html"
