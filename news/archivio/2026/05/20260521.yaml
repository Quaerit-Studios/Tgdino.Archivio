- id: 1
  title: "Rick and Morty - Confermato ufficialmente il film"
  description: |
    La conferma ufficiale è arrivata direttamente dal co-creatore Dan Harmon, in concomitanza con l'imminente debutto televisivo della nona stagione. Il progetto sarà affidato alla regia di Jacob Hair, già veterano della serie e supervisore di alcuni degli episodi più amati dal pubblico. 
    Il team creativo ha preferito puntare su un pilastro interno allo show piuttosto che cercare esternamente. 
  links:
