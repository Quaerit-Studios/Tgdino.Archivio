- id: 1
  title: "Rocket League - Salto generazionale all'Unreal Engine 6"
  description: |
    Dopo ben 11 anni, Psyonix ha annunciato che Rocket League abbandonerà definitivamente l'Unreal Engine 3 per aggiornarsi direttamente al nuovissimo Unreal Engine 6. Il primo sguardo a questo aggiornamento ha svelato una revisione visiva totale: modelli delle vetture ultra-dettagliati, illuminazione avanzata e arene molto più vive e dinamiche. L'obiettivo è migliorare nettamente l'impatto grafico e le prestazioni tecniche, mantenendo però intatto il gameplay originale. 
    Al momento non è stata ancora annunciata una data d'uscita ufficiale per l'update.
  links:
  - "https://www.instagram.com/p/DYvioEjICrO/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Paralives - Il debutto su Steam con 250mila copie in 8 ore"
  description: |
    Il simulatore di vita indipendente Paralives ha debuttato in Accesso Anticipato su Steam registrando un picco di quasi 80mila giocatori simultanei. Nato originariamente da un singolo sviluppatore e realizzato da un team massimo di 15 persone, il titolo sta conquistando il pubblico (88% di recensioni positive su oltre 4mila) proponendosi come un'alternativa valida e più accessibile ai colossi del genere come The Sims. A rafforzare questo successo c'è la promessa ufficiale degli sviluppatori: 
    tutti i futuri DLC saranno rilasciati in forma completamente gratuita. 
  links:
  - "http://multiplayer.it/notizie/in-8-ore-paralives-ha-venduto-tantissimo.html"

- id: 3
  title: "LEGO Skylines - Un leak svela il nuovo gestionale Paradox"
  description: |
    Il comitato di classificazione sudcoreano (GRAC) ha anticipato a sorpresa l'esistenza di LEGO Skylines, un misterioso e inedito progetto targato Paradox Interactive. Pur in assenza di dettagli ufficiali, tutto lascia presagire che si tratti di uno spin-off a mattoncini del celebre Cities: Skylines, pensato per offrire meccaniche di costruzione cittadina più immediate e accessibili. La comparsa del titolo nei database ufficiali suggerisce un annuncio ormai imminente, 
    rendendolo un probabile protagonista dei vicini palcoscenici estivi come lo State of Play o la Summer Game Fest.  
  links:
  - "https://www.everyeye.it/notizie/lego-skylines-leak-anticipa-annuncio-gioco-paradox-880585.html"
