- id: 1
  title: "Xbox - Terremoto ai vertici, lasciano il capo degli Xbox Game Studios e la Chief of Staff"
  description: |
    Craig Duncan, responsabile di Xbox Game Studios, e la chief of staff Louise O'Connor hanno annunciato le proprie dimissioni e lasceranno Microsoft entro la fine della settimana. Questo inatteso addio si inserisce in un periodo di ristrutturazione aziendale mirata a tagliare i costi e incrementare la redditività del brand. In attesa che venga nominato un successore, la gestione di tutti gli studi first-party 
    di Microsoft passerà temporaneamente sotto la direzione del Chief Content Officer, Matt Booty. 
  links:
  - "https://www.instagram.com/p/DZnVTGWlifJ/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Clive Barker's Hellraiser: Revival - Svelata la data d'uscita ufficiale"
  description: |
    Saber Interactive e Boss Team Games hanno annunciato la data di lancio di Clive Barker's Hellraiser: Revival, il survival horror ispirato alla saga cinematografica di culto. Il titolo sarà disponibile a partire dall'8 ottobre su PC, PS5 e Xbox Series X|S. Il gioco proporrà una storia inedita in cui il protagonista attiverà per errore il rituale di Pinhead, dovendo poi scendere negli inferi per salvare la persona amata dalle grinfie dei Cenobiti. Oltre alle armi tradizionali, il gameplay in prima persona permetterà di sfruttare i poteri oscuri della scatola rompicapo Genesis Configuration 
    (come pirocinesi, telecinesi e catene infernali) per combattere e risolvere enigmi. 
  links:
  - "https://multiplayer.it/notizie/clive-barkers-hellraiser-revival-ha-una-data-duscita-annunciata-ecco-quando-arrivera.html"

- id: 3
  title: "Steam Next Fest 2026 - le demo e gli aggiornamenti dei videogiochi italiani in arrivo"
  description: |
    L'edizione estiva dello Steam Next Fest ospita numerosi progetti di studi italiani, presenti con demo giocabili e aggiornamenti sullo stato dei lavori. Tra i titoli figurano l'action-puzzle rétro Orpheus: To Hell and Back, l'horror narrativo Feed It e lo sparatutto in prima persona Scirocco Thugs. La selezione include anche il city-builder ShoreTiles, il dungeon crawler Dungeons of DUSK e le dirette streaming di Spinning Scarecrow, 
    delineando un quadro completo delle prossime uscite nazionali. 
  links:
  - "https://multiplayer.it/notizie/litalia-al-next-fest-di-steam-demo-aggiornamenti-e-iniziative.html"
