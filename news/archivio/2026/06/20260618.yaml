- id: 1
  title: "Daveigh Chase, attrice di The Ring e voce di Lilo, muore all'età di 35 anni"
  description: |
    L'attrice e doppiatrice statunitense Daveigh Chase è scomparsa all'età di 35 anni. È diventata celebre per aver interpretato l'inquietante Samara Morgan nell'horror The Ring e per aver prestato la voce al personaggio di Lilo nel classico Disney Lilo & Stitch. Tra i suoi ruoli principali si ricorda anche 
    il doppiaggio inglese di Chihiro nel capolavoro d'animazione La città incantata. 
  links:
  - "https://www.instagram.com/p/DZssnuGieh9/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Spider-Man: Brand New Day - I dettagli del secondo trailer ufficiale del film in arrivo a luglio"
  description: |
    Sony Pictures ha pubblicato il secondo trailer ufficiale di Spider-Man: Brand New Day, confermando il debutto nelle sale per il 31 luglio. La pellicola, diretta da Destin Daniel Cretton, mostra un Peter Parker (Tom Holland) isolato in una New York priva di ricordi sulla sua identità. Il filmato introduce un'incontrollabile instabilità biologica nei poteri del protagonista, che lo spingerà a cercare il supporto di Bruce Banner (Mark Ruffalo). Nel cast compaiono anche i ritorni di Zendaya e Michael Mando (Scorpion), 
    affiancati dalle new entry Jon Bernthal e Sadie Sink. 
  links:
  - "https://youtu.be/62bIsvRcPv0?si=mE6xb6S7TABf_wus"

- id: 3
  title: "GTA 6 - Rockstar Games svela la copertina ufficiale e la data di avvio dei preordini"
  description: |
    Rockstar Games ha ufficialmente svelato la copertina ufficiale di Grand Theft Auto VI e annunciato che i preordini apriranno il prossimo 25 giugno su PlayStation 5 e Xbox Series X|S. L'artwork mantiene la classica struttura a collage della serie, posizionando al centro i protagonisti Lucia e Jason sullo sfondo di Vice City. Questo passo nella campagna marketing allontanai timori di ulteriori rinvii, 
    blindando la data di uscita globale del gioco per il 19 novembre 2026. 
  links:
  - "https://www.instagram.com/p/DZuooavFC5j/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
