- id: 1
  title: "Ubisoft - Il cofondatore Claude Guillemot muore in un incidente aereo in Francia"
  description: |
    Claude Guillemot, uno dei cinque fratelli fondatori del colosso dei videogiochi Ubisoft, è scomparso a 69 anni in un tragico incidente aereo nella Francia occidentale. Il Cessna 421 di sua proprietà, su cui viaggiava insieme a un istruttore di volo rimasto anch'egli ucciso, è precipitato nei pressi dell'aeroporto di La Baule. Oltre al suo storico ruolo dietro le quinte nel successo di franchise come Assassin's Creed, Guillemot guidava la sussidiaria hardware Guillemot 
    Corporation e sedeva nel consiglio di amministrazione di Ubisoft. 
  links:
  - "https://www.instagram.com/p/DZ1K9HdDOof/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Toy Story 5 - Il miglior debutto al box office americano nella storia della saga"
  description: |
    Toy Story 5 ha ufficialmente registrato il miglior weekend di apertura di sempre al botteghino domestico (nordamericano) per l'intero franchise cinematografico di Pixar. 
    Il nuovo capitolo ha superato i risultati d'incasso stabiliti dai suoi predecessori.  
