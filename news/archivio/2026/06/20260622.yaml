- id: 3
  title: "The Legend of Zelda: Ocarina of Time - Interrotto il remake amatoriale in Unreal Engine 5"
  description: |
    Il team CryZENx ha annunciato l'interruzione definitiva del proprio remake amatoriale in Unreal Engine 5 di The Legend of Zelda: Ocarina of Time, sviluppato nel corso degli ultimi dieci anni. La decisione è stata presa in seguito all'annuncio ufficiale da parte di Nintendo di un remake ufficiale del gioco per Switch 2. Secondo il creatore, l'arrivo di una riedizione ufficiale rende il progetto dei fan ridondante e aumenta sensibilmente il rischio di ripercussioni legali con la casa di Kyoto, 
    sebbene le demo rilasciate finora rimarranno temporaneamente accessibili online. 
  links:
  - "https://multiplayer.it/notizie/con-lannuncio-di-zelda-ocarina-of-time-remake-ufficiale-il-progetto-dei-fan-su-unreal-engine-5-si-ferma.html"
