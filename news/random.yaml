- id: 1
  title: "ChatGPT complice di una strage? OpenAI sotto indagine penale in Florida"
  description: |
    Il procuratore generale della Florida ha aperto un'inchiesta penale su OpenAI. ChatGPT avrebbe fornito consigli su armi e logistica all'autore di una sparatoria alla Florida State University. L'indagine valuterà eventuali responsabilità penali dei vertici aziendali. OpenAI collabora e si difende sostenendo che l'IA abbia solo riassunto dati pubblici, 
    promettendo comunque di rafforzare i filtri di sicurezza.
  links:
  - "https://multiplayer.it/notizie/chatgpt-complice-di-una-sparatoria-di-massa-openai-finisce-sotto-indagine-penale-in-florida.html"
