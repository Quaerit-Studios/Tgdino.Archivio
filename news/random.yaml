- id: 1
  title: "Xbox Game Pass - Il director di Ori critica la qualità del catalogo"
  description: |
    Thomas Mahler, director della serie Ori, ha espresso forti critiche sui social verso Xbox Game Pass e la gestione degli studi di Microsoft, evidenziando la mancanza di successi capaci di attirare il pubblico, come nel caso di Starfield. Secondo lo sviluppatore, la piattaforma soffre di una carenza strutturale di titoli di qualità a causa di accordi che non incentivano i team a dare il massimo. Mahler ha infine paragonato il Game Pass al comunismo, sostenendo che senza forti stimoli economici 
    individuali il sistema sia destinato a produrre solo contenuti mediocri.
  links:
  - "https://multiplayer.it/notizie/xbox-game-pass-non-ha-abbastanza-giochi-di-qualita-director-ori-che-compara-comunismo.html"
