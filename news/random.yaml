  title: "Fortnite - Epic Games rimborsa i cosmetici di D4vd dopo le accuse di omicidio"
  description: |
    Epic Games ha annunciato che rimborserà gli oggetti estetici legati a D4vd a tutti i giocatori di Fortnite che ne faranno richiesta tramite il supporto clienti. La drastica decisione, a cui seguiranno ulteriori provvedimenti, è scaturita in seguito alla sconvolgente incriminazione del cantante, 
    attualmente accusato dell'omicidio di una sedicenne.
