  title: "GTA 6 - Gli hacker minacciano di pubblicare i dati rubati a Rockstar Games"
  description: |
    Il gruppo responsabile della violazione dei server di Rockstar Games ha lanciato un nuovo ultimatum. Dopo aver sottratto un’ampia mole di dati riservati legati allo sviluppo dell'attesissimo Grand Theft Auto 6, i pirati informatici 
    hanno annunciato l'intenzione di diffondere il materiale online a causa del mancato pagamento del riscatto richiesto.
