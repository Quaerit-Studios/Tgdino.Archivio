- id: 1
  title: "DOOM - La colonna sonora diventa patrimonio culturale negli Stati Uniti"
  description: |
    La storica colonna sonora di DOOM è entrata ufficialmente a far parte del National Recording Registry della Biblioteca del Congresso USA. L'opera musicale, composta originariamente da Bobby Prince nel 1993, è stata così riconosciuta come un vero e proprio patrimonio storico. I brani vennero realizzati in formato MIDI, 
    traendo forte ispirazione dal genere metal e hard rock su suggerimento di John Romero.
  links:
