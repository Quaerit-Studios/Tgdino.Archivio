- id: 1
  title: "Comicon di Napoli - Rubata una preziosa carta Pokémon da 1.400 euro"
  description: |
    La giornata d'inaugurazione del Comicon di Napoli 2026 è stata segnata da uno spiacevole evento ai danni dell'espositore San Gennaro Cards. Dallo stand è stata infatti rubata una rara carta Pokémon: un Umbreon VMAX, il cui valore stimato, complice la difficoltà di reperimento e la gradazione, si aggira intorno ai 1.400 euro. L'episodio riaccende purtroppo i riflettori sul problema della sicurezza tra i padiglioni della fiera, 
    già teatro di un furto di entità simile ai danni di un noto content creator durante la passata edizione.
  links:
  - "https://www.everyeye.it/notizie/grave-furto-comicon-napoli-rubata-carta-pok-mon-1-400-euro-san-gennaro-cards-875324.html"
