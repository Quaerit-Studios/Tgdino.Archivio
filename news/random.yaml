- id: 1
  title: "Sony lancia \"The Playerbase\" - I fan diventano protagonisti dei giochi PlayStation"
  description: |
    Sony Interactive Entertainment ha annunciato un'iniziativa unica per premiare la propria community: il programma "The Playerbase". 
    Questo ambizioso progetto mira a scansionare i giocatori reali per inserirli all'interno dei titoli di punta dei PlayStation Studios.
  links:
  - "https://multiplayer.it/notizie/sony-ha-annunciato-il-programma-playerbase-con-cui-vuole-scansionare-i-giocatori-per-inserirli-nei-giochi.html"
