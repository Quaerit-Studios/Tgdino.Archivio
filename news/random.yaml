- id: 1
  title: "Pokémon Pokopia - Un giocatore ricrea la Cittadella Gerudo di Zelda"
  description: |
    Il successo di Pokémon Pokopia su Switch 2 continua a stimolare la fantasia dei fan. Un utente di Reddit ha sfruttato gli strumenti creativi del gioco per ricostruire fedelmente l'iconica Cittadella Gerudo di Breath of the Wild, completa di cascate e Palazzo Reale. 
    Il prossimo obiettivo del creatore sarà realizzare il Villaggio Calbarico o il Borgo dei Rito.
  links:
  - "https://multiplayer.it/notizie/un-giocatore-di-pokemon-pokopia-ha-ricostruito-la-gerudo-town-di-breath-of-the-wild-in-gioco.html"
