  title: "Nintendo Switch - In Giappone torna la moda di assaggiare le cartucce"
  description: |
    Sembra assurdo doverlo ribadire, ma le cartucce dei videogiochi non si mangiano. Eppure, la strana e sconsigliatissima moda di assaggiare i giochi per Nintendo Switch (esplosa originariamente al lancio della prima console nel 2017) è clamorosamente tornata in auge nel Paese del Sol Levante. 
    Questa volta, l'esperimento "culinario" coinvolge anche le nuove schede di Switch 2.
  links:
  - "https://www.everyeye.it/notizie/assaggiando-cartucce-switch-cosa-succede-metti-bocca-870582.html"
