- id: 1
  title: "Forza Horizon 6 - Ban hardware fino all'anno 10.000 per i pirati"
  description: |
    Lo sviluppatore Playground Games sta mantenendo la parola data, punendo severamente chi sfrutta il recente leak di Forza Horizon 6. Un utente che ha trasmesso in streaming una copia pirata del gioco si è visto comminare un impressionante ban hardware valido fino al 31 dicembre 9999. Il team ha confermato che la fuga di dati non è derivata da un errore di pre-load su Steam e ha ribadito la linea dura contro queste infrazioni. 
    I fan sono pertanto invitati ad attendere il rilascio ufficiale dell'atteso titolo di corse, fissato per il 19 maggio.
