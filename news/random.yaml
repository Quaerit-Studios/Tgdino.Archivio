- id: 1
  title: "DC Studios - Peter Safran nega la \"stanchezza da supereroi\", il problema sono i film mediocri"
  description: |
    Il co-CEO dei DC Studios, Peter Safran, si è espresso sul presunto declino dei cinecomic, affermando con decisione che non è mai esistita una vera e propria "stanchezza da supereroi". Secondo il dirigente, il calo di interesse da parte del pubblico è dovuto unicamente a una "stanchezza da film mediocri": un generale abbassamento della qualità delle pellicole avrebbe infatti 
    spinto gli spettatori a desiderare e cercare semplicemente dei prodotti diversi e meglio realizzati.
