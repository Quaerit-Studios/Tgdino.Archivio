- id: 1
  title: "GTA 6 - L'azienda statunitense Burger Motorsports annuncia la chiusura straordinaria nel giorno del lancio"
  description: |
    L'azienda americana, specializzata in componenti per il tuning automobilistico, ha deciso di sospendere le attività per l'intera giornata del 19 novembre 2026, data di uscita di Grand Theft Auto VI. La scelta è dettata dall'elevato numero di richieste di ferie già presentate dal personale per il giorno del lancio, che avrebbe causato gravi problemi nella gestione dei turni. Per evitare rallentamenti e disagi nei vari reparti, 
    la dirigenza ha preferito optare direttamente per una chiusura totale di 24 ore.
  links:
  - "https://multiplayer.it/notizie/unazienda-americana-chiude-per-il-giorno-di-lancio-di-gta-6-a-causa-delle-troppe-richieste-di-ferie.html"
