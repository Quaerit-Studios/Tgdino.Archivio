  title: "Steam Controller - Scoperto un easter egg se il pad cade a terra"
  description: |
    Facendo cadere il dispositivo di Valve da una certa altezza, i sensori interni faranno emettere al pad il famoso "urlo di Wilhelm". L’effetto sonoro viene riprodotto sfruttando la vibrazione dei motori aptici. La community ha confermato che si attiva 
    tranquillamente anche attutendo l'urto su superfici morbide, come letti o cuscini.
