  title: "Il paradosso dell'IA - Il clone esce prima del gioco originale"
  description: |
    Il caso giapponese di Typing Magician sta sollevando un polverone nel panorama videoludico indipendente, portando alla luce uno degli scenari più temuti legati all'uso dell'intelligenza artificiale generativa. 
