  title: "GTA 6 - La Casa Bianca pubblica una parodia della copertina a tema MAGA con Donald Trump"
  description: |
    Poche ore dopo la presentazione della copertina ufficiale di Grand Theft Auto VI, il profilo X della Casa Bianca ha pubblicato una parodia in chiave "Make America Great Again". L'immagine, generata tramite intelligenza artificiale, riprende la tipica struttura a riquadri e i toni cromatici della cover di Rockstar Games, mostrando il presidente Donald Trump in varie pose accompagnato dalla frase: 
    "Abbiamo davvero salvato l'America prima di GTA 6".
  links:
  - "https://multiplayer.it/notizie/copertina-gta-6-parodizzata-slogan-magai-trump.html"
