- id: 1
  title: "Nintendo - Respinto un nuovo brevetto nella battaglia legale contro Palworld"
  description: |
    Il Japan Patent Office (JPO) ha rifiutato a Nintendo la richiesta per il brevetto legato a specifiche meccaniche di cattura di mostri su dispositivi touchscreen. La compagnia giapponese mirava a tutelare i propri brand e a ostacolare lo sviluppo di titoli concorrenti per smartphone, come Palworld Mobile e Roco Kingdom: World. L'ufficio brevetti ha respinto la domanda ritenendo che le dinamiche descritte rappresentano solo regole generiche per i giochi di cattura, prive di elementi tecnologicamente innovativi. Questo rifiuto segue un altro duro colpo subito il mese scorso negli Stati Uniti, 
    dove l'USPTO ha revocato a Nintendo un brevetto legato all'evocazione di creature da combattimento. 
  links:
  - "https://multiplayer.it/notizie/nintendo-negato-altro-brevetto-lotta-contro-palworld-continua.html"
