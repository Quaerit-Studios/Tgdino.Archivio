  title: "The Pokémon Company - Al vaglio un sistema di verifica dell'identità in Giappone"
  description: |
    The Pokémon Company sta valutando seriamente l'introduzione di un nuovo sistema di identificazione tramite documenti sul territorio giapponese. L'iniziativa nasce con l'obiettivo primario di contrastare in modo deciso il fenomeno del bagarinaggio (scalping) e le frodi che affliggono sempre più il Gioco di Carte Collezionabili Pokémon. Questa potenziale misura di sicurezza andrebbe a regolamentare in modo più severo e controllato sia l'acquisto dei prodotti più richiesti dal mercato, 
    sia la partecipazione ai vari eventi e tornei ufficiali.
