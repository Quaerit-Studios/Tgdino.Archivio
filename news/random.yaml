  title: "Carte Pokémon - Un quiz in Giappone per fermare gli scalpers"
  description: |
    Il colosso dell'elettronica giapponese Bic Camera ha introdotto una nuova misura per contrastare gli "scalpers" (coloro che acquistano in blocco prodotti molto richiesti per rivenderli a prezzi gonfiati). Per poter acquistare la nuova espansione Ninja Spinner, i clienti di una filiale di Tokyo devono ora superare un quiz scritto a tema, 
    garantendo che le carte finiscano ai veri appassionati.
