- id: 1
  title: "Streamer di 81 anni subisce uno swatting in diretta"
  description: |
    Sue Jacquot, un'anziana streamer di 81 anni conosciuta su Twitch con lo pseudonimo di "GrammaCrackers", è stata vittima di un episodio di swatting durante una maratona live di Minecraft, videogioco che utilizza per raccogliere fondi destinati alle cure oncologiche del nipote. La notte del 18 maggio, le forze dell'ordine hanno fatto irruzione nella sua abitazione a seguito di una falsa segnalazione, schierando ben venti volanti della polizia, droni e cinque agenti delle squadre speciali SWAT. La donna è tornata in streaming il giorno successivo, raccontando con ironia e leggerezza l'accaduto. Jacquot ha persino ironizzato sul fatto di aver ricevuto tantissime attenzioni e di aver fatto il suo primo giro su una volante prima che l'equivoco venisse chiarito, 
    concludendo la serata con un semplice ibuprofene prima di andare a dormire.
  links:
  - "https://multiplayer.it/notizie/81-anni-e-fa-streaming-per-aiutare-il-nipote-a-pagare-le-cure-per-il-cancro-le-hanno-inviato-la-swat-a-casa.html"
