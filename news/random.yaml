- id: 1
  title: "Kingdom Come - Il creatore punzecchia Ubisoft sulla gestione dei team"
  description: |
    Daniel Vávra, co-fondatore di Warhorse Studios, ha commentato con ironia le recenti difficoltà finanziarie e i licenziamenti in casa Ubisoft. Attraverso Twitter, ha sottolineato come il colosso francese conti ancora 16.600 dipendenti, una forza lavoro ben 70 volte superiore alla sua azienda. Secondo i calcoli di Vávra, con questi numeri Ubisoft avrebbe il potenziale per sviluppare e pubblicare ogni anno ben dieci titoli colossali delle dimensioni dell'imminente Kingdom Come: Deliverance II. Lo sviluppatore ha infine chiuso la provocazione con un'ulteriore frecciatina, chiedendosi sarcasticamente se fosse il caso di 
    approfittare dell'attuale crollo in borsa per acquistare le azioni della compagnia.
  links:
  - "https://multiplayer.it/notizie/creatore-kingdom-come-si-prende-gioco-ubisoft-potrebbero-fare-10-giochi-come-deliverance-anno.html"
