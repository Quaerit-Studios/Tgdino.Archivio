  title: "Seoul - Il Tempio di Jogyesa ordina Gabi, il primo monaco robot della storia"
  description: |
    Il Tempio di Jogyesa a Seoul ha fatto la storia ordinando ufficialmente il primo monaco robotico mai esistito. Il singolare droide, battezzato "Gabi", ha prestato giuramento pronunciando dei voti decisamente unici: si è infatti impegnato solennemente a rispettare la vita, 
    ad ascoltare gli esseri umani e, non ultimo, a risparmiare energia.
