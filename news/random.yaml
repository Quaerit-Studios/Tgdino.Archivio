  title: "Spyro the Dragon - Ritrovata dopo anni la statua dell'E3 2000"
  description: |
    Un'appassionata di videogiochi è riuscita a rintracciare la storica statua monumentale di Spyro, utilizzata da Sony all'E3 2000 per promuovere Spyro: Year of the Dragon e considerata perduta dal 2017. La svolta è arrivata grazie a un video online che la mostrava brevemente in una struttura dismessa. Analizzando i dettagli con Google Street View, la fan ha localizzato il luogo esatto, ovvero un magazzino all'interno di una vecchia stazione di servizio a St. Helens, sempre in Oregon. L'attuale proprietario del complesso era ignaro del valore dell'oggetto e convinto che fosse solo uno "strano mostro" ereditato con la proprietà. La statua in vetroresina, lunga circa 3,6 metri, è stata caricata su un camion e messa definitivamente in salvo in un nuovo deposito, 
    dove l'appassionata inizierà presto i lavori di restauro.
  links:
  - "https://www.everyeye.it/notizie/cercata-anni-ritrovata-statua-perduta-spyro-magazzino-880086.html"
