  title: "The Boys - La serie ha predetto la statua dorata di Donald Trump"
  description: |
    Lo showrunner di The Boys, Eric Kripke, ha commentato le curiose osservazioni dei fan sulla serie. Lo show avrebbe infatti predetto in modo del tutto accidentale l'apparizione di una statua dorata di Donald Trump. Gli spettatori hanno immediatamente notato le forti similitudini tra le vicende della finzione televisiva e l'attuale realtà politica. Kripke ha reagito a questa singolare coincidenza, 
    diventata rapidamente un argomento di forte discussione per l'intera community sul web. 
  links:
