  title: "Bloodborne - In arrivo un film d'animazione co-prodotto da Jacksepticeye"
  description: |
    Durante il CinemaCon di Las Vegas, Sony Pictures ha sorpreso i fan annunciando ufficialmente un adattamento cinematografico di Bloodborne, l'amatissimo e oscuro videogioco "soulsborne" sviluppato da FromSoftware. L'opera sarà un lungometraggio d'animazione con rating R 
    (vietato ai minori) e vedrà il coinvolgimento diretto del popolare YouTuber Jacksepticeye alla produzione.
