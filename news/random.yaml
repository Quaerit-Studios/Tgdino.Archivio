  title: "Il Signore degli Anelli - Anya Taylor Joy entra nel cast de \"La Caccia a Gollum\""
  description: |
    L'attrice interpreterà Seren, un personaggio originale non presente nei libri, descritto come un’elfa Sindar al servizio di Re Thranduil, interpretato nuovamente da Lee Pace. La pellicola sarà diretta da Andy Serkis, che riprenderà anche il ruolo di Gollum attraverso la motion capture. Tra le novità principali del cast spiccano Jamie Dornan nei panni di un giovane Aragorn (in sostituzione di Viggo Mortensen) e Kate Winslet nel ruolo di Marigol. Confermati invece i ritorni di Ian McKellen (Gandalf) ed Elijah Wood (Frodo) per un'avventura 
    ambientata cronologicamente tra Lo Hobbit e La Compagnia dell'Anello.
  links:
  - "https://multiplayer.it/notizie/anya-taylor-joy-sara-nel-cast-de-il-signore-degli-anelli-la-caccia-a-gollum.html"
