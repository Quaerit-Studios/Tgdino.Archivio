  title: "OD - Hideo Kojima svela un sistema inedito per aiutare i giocatori troppo spaventati"
  description: |
    Hideo Kojima ha condiviso nuovi dettagli sul suo atteso horror OD, sviluppato in collaborazione con Xbox Game Studios. L’autore ha dichiarato a Entertainment Weekly di voler superare ogni limite di terrore mai raggiunto prima nei videogiochi. Per evitare però che il pubblico abbandoni la partita, Kojima ha ideato un meccanismo segreto e mai visto prima che permetterà a 
    chiunque di proseguire l'avventura anche nei momenti di massima paura.
