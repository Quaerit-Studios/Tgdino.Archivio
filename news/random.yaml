  title: "Resident Evil 4 Remake - Il Mercante è in bancarotta con un debito di 3 trilioni"
  description: |
    A tre anni dall'uscita del remake di Resident Evil 4, Capcom ha deciso di condividere alcune statistiche esilaranti sulle abitudini dei giocatori, 
    svelando un retroscena tragicomico: l'iconico e misterioso Mercante del gioco è letteralmente sommerso dai debiti. A quanto pare, la sua ossessione per l'acquisto di ogni singolo tesoro, rubino o uovo raccolto da Leon Kennedy lo ha portato sul lastrico.

